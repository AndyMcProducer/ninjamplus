name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  windows:
    name: Windows (Standalone, VST3)
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect project root
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "extras/ninjam-vst3/CMakeLists.txt") {
            "SRC_DIR=extras/ninjam-vst3" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "SRC_DIR=." | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Configure
        run: >
          cmake -S $env:SRC_DIR -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: >
          cmake --build build --config Release
          --target NINJAM_VST3_Standalone NINJAM_VST3_VST3

      - name: Prepare signing certificate
        if: ${{ secrets.WIN_CODESIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bytes = [Convert]::FromBase64String("${{ secrets.WIN_CODESIGN_PFX_BASE64 }}")
          [IO.File]::WriteAllBytes("codesign.pfx", $bytes)

      - name: Sign build outputs
        if: ${{ secrets.WIN_CODESIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $artefacts = Join-Path $PWD "build\NINJAM_VST3_artefacts\Release"
          $standaloneDir = Join-Path $artefacts "Standalone"
          $vst3Dir = Join-Path $artefacts "VST3"

          $targets = New-Object System.Collections.Generic.List[string]
          if (Test-Path $standaloneDir) {
            Get-ChildItem -Path $standaloneDir -Recurse -File -Include *.exe,*.dll | ForEach-Object { $targets.Add($_.FullName) }
          }
          if (Test-Path $vst3Dir) {
            Get-ChildItem -Path $vst3Dir -Recurse -File -Include *.exe,*.dll | ForEach-Object { $targets.Add($_.FullName) }
          }

          if ($targets.Count -eq 0) { throw "No binaries found to sign." }

          $ts = "http://timestamp.digicert.com"
          foreach ($file in $targets) {
            & signtool sign /fd SHA256 /f "codesign.pfx" /p "${{ secrets.WIN_CODESIGN_PFX_PASSWORD }}" /tr $ts /td SHA256 /v $file
          }

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path out | Out-Null

          $srcRoot = Join-Path $PWD $env:SRC_DIR

          $artefacts = Join-Path $PWD "build\NINJAM_VST3_artefacts\Release"
          $standaloneDir = Join-Path $artefacts "Standalone"
          $vst3Dir = Join-Path $artefacts "VST3"

          if (Test-Path $standaloneDir) {
            $texturesSrc = Join-Path $srcRoot "textures"
            if (Test-Path $texturesSrc) {
              $texturesDst = Join-Path $standaloneDir "textures"
              if (Test-Path $texturesDst) { Remove-Item -Recurse -Force $texturesDst }
              Copy-Item -Recurse -Force $texturesSrc $texturesDst
            }
            $vdoSrc = Join-Path $srcRoot "advanced-vdo-client"
            if (Test-Path $vdoSrc) {
              $vdoDst = Join-Path $standaloneDir "advanced-vdo-client"
              if (Test-Path $vdoDst) { Remove-Item -Recurse -Force $vdoDst }
              Copy-Item -Recurse -Force $vdoSrc $vdoDst
            }
            Compress-Archive -Force -Path (Join-Path $standaloneDir "*") -DestinationPath "out\windows-standalone.zip"
          } else {
            throw "Standalone artefacts not found at $standaloneDir"
          }

          if (Test-Path $vst3Dir) {
            $bundleDir = Get-ChildItem -Path $vst3Dir -Directory -Filter "*.vst3" | Select-Object -First 1
            if ($null -ne $bundleDir) {
              $resourcesDir = Join-Path $bundleDir.FullName "Contents\\Resources"
              New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null

              $texturesSrc = Join-Path $srcRoot "textures"
              if (Test-Path $texturesSrc) {
                $texturesDst = Join-Path $resourcesDir "textures"
                if (Test-Path $texturesDst) { Remove-Item -Recurse -Force $texturesDst }
                Copy-Item -Recurse -Force $texturesSrc $texturesDst
              }

              $vdoSrc = Join-Path $srcRoot "advanced-vdo-client"
              if (Test-Path $vdoSrc) {
                $vdoDst = Join-Path $resourcesDir "advanced-vdo-client"
                if (Test-Path $vdoDst) { Remove-Item -Recurse -Force $vdoDst }
                Copy-Item -Recurse -Force $vdoSrc $vdoDst
              }
            }

            Compress-Archive -Force -Path (Join-Path $vst3Dir "*") -DestinationPath "out\windows-vst3.zip"
          } else {
            throw "VST3 artefacts not found at $vst3Dir"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "v0.0.0" }
          $version = $tag
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }

          $artefacts = Join-Path $PWD "build\NINJAM_VST3_artefacts\Release"
          $standaloneDir = Join-Path $artefacts "Standalone"
          $vst3Dir = Join-Path $artefacts "VST3"

          $exe = Get-ChildItem -Path $standaloneDir -File -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $exe) { throw "Standalone exe not found in $standaloneDir" }

          $vst3Bundle = Get-ChildItem -Path $vst3Dir -Directory -Filter "*.vst3" | Select-Object -First 1
          if ($null -eq $vst3Bundle) { throw "VST3 bundle not found in $vst3Dir" }

          $iss = @"
[Setup]
AppName=NINJAM VST3
AppVersion=$version
DefaultDirName={autopf}\\NINJAM VST3
DefaultGroupName=NINJAM VST3
Compression=lzma2
SolidCompression=yes
ArchitecturesInstallIn64BitMode=x64
OutputDir=out
OutputBaseFilename=NINJAM-VST3-Setup-Windows
DisableProgramGroupPage=yes

[Files]
Source: ""$($exe.FullName)""; DestDir: ""{app}""; Flags: ignoreversion
Source: ""$standaloneDir\\*""; DestDir: ""{app}""; Flags: ignoreversion recursesubdirs createallsubdirs
Source: ""$($vst3Bundle.FullName)\\*""; DestDir: ""{commoncf}\\VST3\\$($vst3Bundle.Name)""; Flags: ignoreversion recursesubdirs createallsubdirs

[Icons]
Name: ""{autoprograms}\\NINJAM VST3""; Filename: ""{app}\\$($exe.Name)""

[Run]
Filename: ""{app}\\$($exe.Name)""; Description: ""Launch NINJAM VST3""; Flags: postinstall nowait skipifsilent
"@

          Set-Content -Path "installer.iss" -Value $iss -Encoding UTF8
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer.iss"
          if (Test-Path "codesign.pfx") {
            $ts = "http://timestamp.digicert.com"
            $setup = Join-Path $PWD "out\NINJAM-VST3-Setup-Windows.exe"
            if (Test-Path $setup) {
              & signtool sign /fd SHA256 /f "codesign.pfx" /p "${{ secrets.WIN_CODESIGN_PFX_PASSWORD }}" /tr $ts /td SHA256 /v $setup
            }
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: out/*

  mac:
    name: macOS (Standalone, AU, VST3)
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect project root
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "extras/ninjam-vst3/CMakeLists.txt" ]; then
            echo "SRC_DIR=extras/ninjam-vst3" >> "$GITHUB_ENV"
          else
            echo "SRC_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: cmake -S "${SRC_DIR}" -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target NINJAM_VST3_Standalone NINJAM_VST3_AU NINJAM_VST3_VST3

      - name: Import signing certificate
        if: ${{ secrets.MACOS_CERT_P12_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="${{ secrets.MACOS_KEYCHAIN_PASSWORD }}"
          CERT_P12_PATH="$RUNNER_TEMP/cert.p12"

          echo "${{ secrets.MACOS_CERT_P12_BASE64 }}" | base64 --decode > "$CERT_P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_P12_PATH" -k "$KEYCHAIN_PATH" -P "${{ secrets.MACOS_CERT_P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out

          ARTEFACTS="build/NINJAM_VST3_artefacts/Release"
          STANDALONE_DIR="${ARTEFACTS}/Standalone"
          AU_DIR="${ARTEFACTS}/AU"
          VST3_DIR="${ARTEFACTS}/VST3"

          if [ -d "${STANDALONE_DIR}" ]; then
            APP_PATH="$(find "${STANDALONE_DIR}" -maxdepth 1 -name "*.app" -print -quit)"
            if [ -z "${APP_PATH}" ]; then
              echo "No .app found in ${STANDALONE_DIR}"
              exit 1
            fi

            MACOS_DIR="${APP_PATH}/Contents/MacOS"
            rm -rf "${MACOS_DIR}/textures" "${MACOS_DIR}/advanced-vdo-client" || true
            cp -R "${SRC_DIR}/textures" "${MACOS_DIR}/textures"
            cp -R "${SRC_DIR}/advanced-vdo-client" "${MACOS_DIR}/advanced-vdo-client"

            ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "out/macos-standalone.zip"
          else
            echo "Standalone artefacts not found at ${STANDALONE_DIR}"
            exit 1
          fi

          if [ -d "${AU_DIR}" ]; then
            COMP_PATH="$(find "${AU_DIR}" -maxdepth 1 -name "*.component" -print -quit)"
            if [ -z "${COMP_PATH}" ]; then
              echo "No .component found in ${AU_DIR}"
              exit 1
            fi
            mkdir -p "${COMP_PATH}/Contents/Resources"
            rm -rf "${COMP_PATH}/Contents/Resources/textures" "${COMP_PATH}/Contents/Resources/advanced-vdo-client" || true
            cp -R "${SRC_DIR}/textures" "${COMP_PATH}/Contents/Resources/textures"
            cp -R "${SRC_DIR}/advanced-vdo-client" "${COMP_PATH}/Contents/Resources/advanced-vdo-client"
            ditto -c -k --sequesterRsrc --keepParent "${COMP_PATH}" "out/macos-au.zip"
          else
            echo "AU artefacts not found at ${AU_DIR}"
            exit 1
          fi

          if [ -d "${VST3_DIR}" ]; then
            VST3_PATH="$(find "${VST3_DIR}" -maxdepth 1 -name "*.vst3" -print -quit)"
            if [ -z "${VST3_PATH}" ]; then
              echo "No .vst3 found in ${VST3_DIR}"
              exit 1
            fi
            mkdir -p "${VST3_PATH}/Contents/Resources"
            rm -rf "${VST3_PATH}/Contents/Resources/textures" "${VST3_PATH}/Contents/Resources/advanced-vdo-client" || true
            cp -R "${SRC_DIR}/textures" "${VST3_PATH}/Contents/Resources/textures"
            cp -R "${SRC_DIR}/advanced-vdo-client" "${VST3_PATH}/Contents/Resources/advanced-vdo-client"
            ditto -c -k --sequesterRsrc --keepParent "${VST3_PATH}" "out/macos-vst3.zip"
          else
            echo "VST3 artefacts not found at ${VST3_DIR}"
            exit 1
          fi

          if [ -n "${{ secrets.MACOS_SIGN_IDENTITY_APP }}" ]; then
            codesign --force --timestamp --options runtime --sign "${{ secrets.MACOS_SIGN_IDENTITY_APP }}" --deep "${APP_PATH}"
            codesign --force --timestamp --options runtime --sign "${{ secrets.MACOS_SIGN_IDENTITY_APP }}" --deep "${COMP_PATH}"
            codesign --force --timestamp --options runtime --sign "${{ secrets.MACOS_SIGN_IDENTITY_APP }}" --deep "${VST3_PATH}"
          fi

          TAG="${RELEASE_TAG:-v0.0.0}"
          VERSION="${TAG#v}"
          PKGROOT="pkgroot"
          rm -rf "${PKGROOT}"
          mkdir -p "${PKGROOT}/Applications"
          mkdir -p "${PKGROOT}/Library/Audio/Plug-Ins/Components"
          mkdir -p "${PKGROOT}/Library/Audio/Plug-Ins/VST3"
          cp -R "${APP_PATH}" "${PKGROOT}/Applications/"
          cp -R "${COMP_PATH}" "${PKGROOT}/Library/Audio/Plug-Ins/Components/"
          cp -R "${VST3_PATH}" "${PKGROOT}/Library/Audio/Plug-Ins/VST3/"
          pkgbuild --root "${PKGROOT}" --install-location "/" --identifier "com.andymcproducer.ninjamvst3" --version "${VERSION}" "out/NINJAM-VST3-macOS-unsigned.pkg"
          if [ -n "${{ secrets.MACOS_SIGN_IDENTITY_INSTALLER }}" ]; then
            productsign --sign "${{ secrets.MACOS_SIGN_IDENTITY_INSTALLER }}" "out/NINJAM-VST3-macOS-unsigned.pkg" "out/NINJAM-VST3-macOS.pkg"
            rm -f "out/NINJAM-VST3-macOS-unsigned.pkg"
          else
            mv "out/NINJAM-VST3-macOS-unsigned.pkg" "out/NINJAM-VST3-macOS.pkg"
          fi

          if [ -n "${{ secrets.APPLE_NOTARY_KEY_ID }}" ] && [ -n "${{ secrets.APPLE_NOTARY_ISSUER_ID }}" ] && [ -n "${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}" ]; then
            NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            echo "${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}" | base64 --decode > "$NOTARY_KEY_PATH"
            xcrun notarytool submit "out/NINJAM-VST3-macOS.pkg" --key "$NOTARY_KEY_PATH" --key-id "${{ secrets.APPLE_NOTARY_KEY_ID }}" --issuer "${{ secrets.APPLE_NOTARY_ISSUER_ID }}" --wait
            xcrun stapler staple "out/NINJAM-VST3-macOS.pkg"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: out/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [windows, mac]
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: out

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: out/*
