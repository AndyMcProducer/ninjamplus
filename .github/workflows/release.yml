name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  windows:
    name: Windows (Standalone, VST3)
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect project root
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cmakeFile = Get-ChildItem -Path . -Recurse -File -Filter CMakeLists.txt | Where-Object {
            Select-String -Path $_.FullName -Pattern 'project\s*\(\s*NINJAM_VST3\b' -Quiet
          } | Select-Object -First 1
          if ($null -eq $cmakeFile) {
            throw "Could not find CMakeLists.txt for NINJAM_VST3"
          }
          $srcDir = [System.IO.Path]::GetRelativePath($PWD.Path, $cmakeFile.DirectoryName)
          if ([string]::IsNullOrWhiteSpace($srcDir)) { $srcDir = "." }
          $srcDir = $srcDir -replace "\\", "/"
          "SRC_DIR=$srcDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using SRC_DIR=$srcDir"

      - name: Configure
        run: >
          cmake -S $env:SRC_DIR -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: >
          cmake --build build --config Release
          --target NINJAM_VST3_Standalone NINJAM_VST3_VST3

      - name: Setup Node LTS For Packaging
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path out | Out-Null

          $srcRoot = Join-Path $PWD $env:SRC_DIR
          $npmCmd = Get-Command npm -ErrorAction SilentlyContinue
          if ($null -eq $npmCmd -or -not (Test-Path $npmCmd.Source)) {
            throw "npm executable not found on PATH"
          }
          $nodeCmd = Get-Command node -ErrorAction SilentlyContinue
          if ($null -eq $nodeCmd -or -not (Test-Path $nodeCmd.Source)) {
            throw "Node executable not found on PATH"
          }
          $nodeExe = $nodeCmd.Source

          $artefacts = Join-Path $PWD "build\NINJAM_VST3_artefacts\Release"
          $standaloneDir = Join-Path $artefacts "Standalone"
          $vst3Dir = Join-Path $artefacts "VST3"

          if (Test-Path $standaloneDir) {
            $texturesSrc = Join-Path $srcRoot "textures"
            if (Test-Path $texturesSrc) {
              $texturesDst = Join-Path $standaloneDir "textures"
              if (Test-Path $texturesDst) { Remove-Item -Recurse -Force $texturesDst }
              Copy-Item -Recurse -Force $texturesSrc $texturesDst
            }
            $vdoSrc = Join-Path $srcRoot "advanced-vdo-client"
            if (Test-Path $vdoSrc) {
              $vdoDst = Join-Path $standaloneDir "advanced-vdo-client"
              if (Test-Path $vdoDst) { Remove-Item -Recurse -Force $vdoDst }
              Copy-Item -Recurse -Force $vdoSrc $vdoDst
              Push-Location $vdoDst
              try {
                & $npmCmd.Source install --omit=dev --no-audit --no-fund
              } finally {
                Pop-Location
              }
              Copy-Item -Force $nodeExe (Join-Path $vdoDst "node.exe")
            }
            Compress-Archive -Force -Path (Join-Path $standaloneDir "*") -DestinationPath "out\windows-standalone.zip"
          } else {
            throw "Standalone artefacts not found at $standaloneDir"
          }

          if (Test-Path $vst3Dir) {
            $bundleDir = Get-ChildItem -Path $vst3Dir -Directory -Filter "*.vst3" | Select-Object -First 1
            if ($null -ne $bundleDir) {
              $resourcesDir = Join-Path $bundleDir.FullName "Contents\\Resources"
              New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null

              $texturesSrc = Join-Path $srcRoot "textures"
              if (Test-Path $texturesSrc) {
                $texturesDst = Join-Path $resourcesDir "textures"
                if (Test-Path $texturesDst) { Remove-Item -Recurse -Force $texturesDst }
                Copy-Item -Recurse -Force $texturesSrc $texturesDst
              }

              $vdoSrc = Join-Path $srcRoot "advanced-vdo-client"
              if (Test-Path $vdoSrc) {
                $vdoDst = Join-Path $resourcesDir "advanced-vdo-client"
                if (Test-Path $vdoDst) { Remove-Item -Recurse -Force $vdoDst }
                Copy-Item -Recurse -Force $vdoSrc $vdoDst
                Push-Location $vdoDst
                try {
                  & $npmCmd.Source install --omit=dev --no-audit --no-fund
                } finally {
                  Pop-Location
                }
                Copy-Item -Force $nodeExe (Join-Path $vdoDst "node.exe")
              }
            }

            Compress-Archive -Force -Path (Join-Path $vst3Dir "*") -DestinationPath "out\windows-vst3.zip"
          } else {
            throw "VST3 artefacts not found at $vst3Dir"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "v0.0.0" }
          $version = $tag
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }

          $artefacts = Join-Path $PWD "build\NINJAM_VST3_artefacts\Release"
          $standaloneDir = Join-Path $artefacts "Standalone"
          $vst3Dir = Join-Path $artefacts "VST3"

          $exe = Get-ChildItem -Path $standaloneDir -File -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $exe) { throw "Standalone exe not found in $standaloneDir" }

          $vst3Bundle = Get-ChildItem -Path $vst3Dir -Directory -Filter "*.vst3" | Select-Object -First 1
          if ($null -eq $vst3Bundle) { throw "VST3 bundle not found in $vst3Dir" }

          $issLines = @(
            '[Setup]'
            'AppName=NINJAM VST3'
            "AppVersion=$version"
            'DefaultDirName={autopf}\NINJAM VST3'
            'DefaultGroupName=NINJAM VST3'
            'Compression=lzma2'
            'SolidCompression=yes'
            'ArchitecturesInstallIn64BitMode=x64'
            'OutputDir=out'
            'OutputBaseFilename=NINJAM-VST3-Setup-Windows'
            'DisableProgramGroupPage=yes'
            ''
            '[Files]'
            "Source: ""$($exe.FullName)""; DestDir: ""{app}""; Flags: ignoreversion"
            "Source: ""$standaloneDir\*""; DestDir: ""{app}""; Flags: ignoreversion recursesubdirs createallsubdirs"
            "Source: ""$($vst3Bundle.FullName)\*""; DestDir: ""{commoncf}\VST3\$($vst3Bundle.Name)""; Flags: ignoreversion recursesubdirs createallsubdirs"
            ''
            '[Icons]'
            "Name: ""{autoprograms}\NINJAM VST3""; Filename: ""{app}\$($exe.Name)"""
            ''
            '[Run]'
            "Filename: ""{app}\$($exe.Name)""; Description: ""Launch NINJAM VST3""; Flags: postinstall nowait skipifsilent"
          )
          $iss = ($issLines -join "`r`n") + "`r`n"

          Set-Content -Path "installer.iss" -Value $iss -Encoding UTF8
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: out/*

  mac:
    name: macOS (Standalone, AU, VST3)
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect project root
        shell: bash
        run: |
          set -euo pipefail
          CMAKE_FILE="$(
            find . -name CMakeLists.txt -type f -print0 | while IFS= read -r -d '' f; do
              if grep -Eq 'project[[:space:]]*\([[:space:]]*NINJAM_VST3\b' "$f"; then
                echo "$f"
                break
              fi
            done
          )"
          if [ -z "${CMAKE_FILE}" ]; then
            echo "Could not find CMakeLists.txt for NINJAM_VST3"
            exit 1
          fi
          SRC_DIR="$(dirname "${CMAKE_FILE}")"
          SRC_DIR="${SRC_DIR#./}"
          if [ -z "${SRC_DIR}" ]; then SRC_DIR="."; fi
          echo "SRC_DIR=${SRC_DIR}" >> "$GITHUB_ENV"
          echo "Using SRC_DIR=${SRC_DIR}"

      - name: Configure
        run: cmake -S "${SRC_DIR}" -B build -G Xcode

      - name: Build
        run: >
          cmake --build build --config Release
          --target NINJAM_VST3_Standalone NINJAM_VST3_AU NINJAM_VST3_VST3
          -- CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=""

      - name: Setup Node LTS For Packaging
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Package
        shell: bash
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_INSTALLER_IDENTITY: ${{ secrets.MACOS_INSTALLER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          mkdir -p out

          ARTEFACTS="build/NINJAM_VST3_artefacts/Release"
          STANDALONE_DIR="${ARTEFACTS}/Standalone"
          AU_DIR="${ARTEFACTS}/AU"
          VST3_DIR="${ARTEFACTS}/VST3"
          NODE_BIN="$(command -v node || true)"
          if [ -z "${NODE_BIN}" ] || [ ! -f "${NODE_BIN}" ]; then
            echo "Node executable not found on PATH"
            exit 1
          fi

          SIGN_ENABLED=0
          if [ -n "${MACOS_SIGN_IDENTITY:-}" ]; then
            SIGN_ENABLED=1
            echo "Using Developer ID Application signing."
          else
            echo "MACOS_SIGN_IDENTITY not set; using ad-hoc signing."
          fi

          NOTARY_ENABLED=0
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            NOTARY_ENABLED=1
            echo "Notarization is enabled."
          else
            echo "Notarization secrets missing; skipping notarization."
          fi

          sign_binary() {
            local target="$1"
            xattr -cr "${target}" || true
            if [ "${SIGN_ENABLED}" -eq 1 ]; then
              codesign --force --options runtime --timestamp --sign "${MACOS_SIGN_IDENTITY}" "${target}"
            fi
          }

          sign_bundle() {
            local target="$1"
            xattr -cr "${target}" || true
            if [ "${SIGN_ENABLED}" -eq 1 ]; then
              codesign --force --deep --options runtime --timestamp --sign "${MACOS_SIGN_IDENTITY}" "${target}"
            else
              codesign --force --deep --sign - "${target}"
            fi
          }

          install_vdo_deps() {
            local target_dir="$1"
            if [ -f "${target_dir}/package-lock.json" ]; then
              (cd "${target_dir}" && npm ci --omit=dev --no-audit --no-fund)
            else
              (cd "${target_dir}" && npm install --omit=dev --no-audit --no-fund)
            fi
          }

          if [ -d "${STANDALONE_DIR}" ]; then
            APP_PATH="$(find "${STANDALONE_DIR}" -maxdepth 1 -name "*.app" -print -quit)"
            if [ -z "${APP_PATH}" ]; then
              echo "No .app found in ${STANDALONE_DIR}"
              exit 1
            fi

            MACOS_DIR="${APP_PATH}/Contents/MacOS"
            rm -rf "${MACOS_DIR}/textures" "${MACOS_DIR}/advanced-vdo-client" || true
            cp -R "${SRC_DIR}/textures" "${MACOS_DIR}/textures"
            cp -R "${SRC_DIR}/advanced-vdo-client" "${MACOS_DIR}/advanced-vdo-client"
            install_vdo_deps "${MACOS_DIR}/advanced-vdo-client"
            cp -f "${NODE_BIN}" "${MACOS_DIR}/advanced-vdo-client/node"
            chmod +x "${MACOS_DIR}/advanced-vdo-client/node"
            sign_binary "${MACOS_DIR}/advanced-vdo-client/node"

            sign_bundle "${APP_PATH}"

            ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "out/macos-standalone.zip"
          else
            echo "Standalone artefacts not found at ${STANDALONE_DIR}"
            exit 1
          fi

          if [ -d "${AU_DIR}" ]; then
            COMP_PATH="$(find "${AU_DIR}" -maxdepth 1 -name "*.component" -print -quit)"
            if [ -z "${COMP_PATH}" ]; then
              echo "No .component found in ${AU_DIR}"
              exit 1
            fi
            mkdir -p "${COMP_PATH}/Contents/Resources"
            rm -rf "${COMP_PATH}/Contents/Resources/textures" "${COMP_PATH}/Contents/Resources/advanced-vdo-client" || true
            cp -R "${SRC_DIR}/textures" "${COMP_PATH}/Contents/Resources/textures"
            cp -R "${SRC_DIR}/advanced-vdo-client" "${COMP_PATH}/Contents/Resources/advanced-vdo-client"
            install_vdo_deps "${COMP_PATH}/Contents/Resources/advanced-vdo-client"
            cp -f "${NODE_BIN}" "${COMP_PATH}/Contents/Resources/advanced-vdo-client/node"
            chmod +x "${COMP_PATH}/Contents/Resources/advanced-vdo-client/node"
            sign_binary "${COMP_PATH}/Contents/Resources/advanced-vdo-client/node"

            sign_bundle "${COMP_PATH}"

            ditto -c -k --sequesterRsrc --keepParent "${COMP_PATH}" "out/macos-au.zip"
          else
            echo "AU artefacts not found at ${AU_DIR}"
            exit 1
          fi

          if [ -d "${VST3_DIR}" ]; then
            VST3_PATH="$(find "${VST3_DIR}" -maxdepth 1 -name "*.vst3" -print -quit)"
            if [ -z "${VST3_PATH}" ]; then
              echo "No .vst3 found in ${VST3_DIR}"
              exit 1
            fi
            mkdir -p "${VST3_PATH}/Contents/Resources"
            rm -rf "${VST3_PATH}/Contents/Resources/textures" "${VST3_PATH}/Contents/Resources/advanced-vdo-client" || true
            cp -R "${SRC_DIR}/textures" "${VST3_PATH}/Contents/Resources/textures"
            cp -R "${SRC_DIR}/advanced-vdo-client" "${VST3_PATH}/Contents/Resources/advanced-vdo-client"
            install_vdo_deps "${VST3_PATH}/Contents/Resources/advanced-vdo-client"
            cp -f "${NODE_BIN}" "${VST3_PATH}/Contents/Resources/advanced-vdo-client/node"
            chmod +x "${VST3_PATH}/Contents/Resources/advanced-vdo-client/node"
            sign_binary "${VST3_PATH}/Contents/Resources/advanced-vdo-client/node"

            sign_bundle "${VST3_PATH}"

            ditto -c -k --sequesterRsrc --keepParent "${VST3_PATH}" "out/macos-vst3.zip"
          else
            echo "VST3 artefacts not found at ${VST3_DIR}"
            exit 1
          fi

          TAG="${RELEASE_TAG:-v0.0.0}"
          VERSION="${TAG#v}"
          PKGROOT="pkgroot"
          rm -rf "${PKGROOT}"
          mkdir -p "${PKGROOT}/Applications"
          mkdir -p "${PKGROOT}/Library/Audio/Plug-Ins/Components"
          mkdir -p "${PKGROOT}/Library/Audio/Plug-Ins/VST3"
          cp -R "${APP_PATH}" "${PKGROOT}/Applications/"
          cp -R "${COMP_PATH}" "${PKGROOT}/Library/Audio/Plug-Ins/Components/"
          cp -R "${VST3_PATH}" "${PKGROOT}/Library/Audio/Plug-Ins/VST3/"
          pkgbuild --root "${PKGROOT}" --install-location "/" --identifier "com.andymcproducer.ninjamvst3" --version "${VERSION}" "out/NINJAM-VST3-macOS-unsigned.pkg"
          if [ "${SIGN_ENABLED}" -eq 1 ] && [ -n "${MACOS_INSTALLER_IDENTITY:-}" ]; then
            productsign --sign "${MACOS_INSTALLER_IDENTITY}" "out/NINJAM-VST3-macOS-unsigned.pkg" "out/NINJAM-VST3-macOS.pkg"
            rm -f "out/NINJAM-VST3-macOS-unsigned.pkg"
          else
            mv "out/NINJAM-VST3-macOS-unsigned.pkg" "out/NINJAM-VST3-macOS.pkg"
          fi

          if [ "${NOTARY_ENABLED}" -eq 1 ]; then
            xcrun notarytool submit "out/NINJAM-VST3-macOS.pkg" \
              --apple-id "${APPLE_ID}" \
              --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
              --team-id "${APPLE_TEAM_ID}" \
              --wait
            xcrun stapler staple "out/NINJAM-VST3-macOS.pkg"
            xcrun stapler staple "${APP_PATH}" || true
            xcrun stapler staple "${COMP_PATH}" || true
            xcrun stapler staple "${VST3_PATH}" || true
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: out/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [windows, mac]
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: out

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease || contains(github.ref_name, '-') }}
          files: out/*
