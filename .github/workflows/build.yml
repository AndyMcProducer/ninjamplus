name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows:
    name: Windows (Standalone, VST3)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect project root
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cmakeFile = Get-ChildItem -Path . -Recurse -File -Filter CMakeLists.txt | Where-Object {
            Select-String -Path $_.FullName -Pattern 'project\s*\(\s*NINJAM_VST3\b' -Quiet
          } | Select-Object -First 1
          if ($null -eq $cmakeFile) {
            throw "Could not find CMakeLists.txt for NINJAM_VST3"
          }
          $srcDir = [System.IO.Path]::GetRelativePath($PWD.Path, $cmakeFile.DirectoryName)
          if ([string]::IsNullOrWhiteSpace($srcDir)) { $srcDir = "." }
          $srcDir = $srcDir -replace "\\", "/"
          "SRC_DIR=$srcDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using SRC_DIR=$srcDir"

      - name: Configure
        run: >
          cmake -S $env:SRC_DIR -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: >
          cmake --build build --config Release
          --target NINJAM_VST3_Standalone NINJAM_VST3_VST3

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path out | Out-Null

          $srcRoot = Join-Path $PWD $env:SRC_DIR
          $noticeFiles = @("LEGAL_NOTICES.txt", "THIRD_PARTY_NOTICES.md")

          $artefacts = Join-Path $PWD "build\NINJAMplus\Release"
          $standaloneDir = Join-Path $artefacts "Standalone"
          $vst3Dir = Join-Path $artefacts "VST3"

          if (Test-Path $standaloneDir) {
            $texturesSrc = Join-Path $srcRoot "textures"
            if (Test-Path $texturesSrc) {
              $texturesDst = Join-Path $standaloneDir "textures"
              if (Test-Path $texturesDst) { Remove-Item -Recurse -Force $texturesDst }
              Copy-Item -Recurse -Force $texturesSrc $texturesDst
            }
            foreach ($noticeName in $noticeFiles) {
              $noticeSrc = Join-Path $srcRoot $noticeName
              if (Test-Path $noticeSrc) {
                Copy-Item -Force $noticeSrc (Join-Path $standaloneDir $noticeName)
              }
            }
            $vdoSrc = Join-Path $srcRoot "advanced-vdo-client"
            if (Test-Path $vdoSrc) {
              $vdoDst = Join-Path $standaloneDir "advanced-vdo-client"
              if (Test-Path $vdoDst) { Remove-Item -Recurse -Force $vdoDst }
              Copy-Item -Recurse -Force $vdoSrc $vdoDst
            }
            Compress-Archive -Force -Path (Join-Path $standaloneDir "*") -DestinationPath "out\NINJAMplus-windows-standalone.zip"
          } else {
            throw "Standalone artefacts not found at $standaloneDir"
          }

          if (Test-Path $vst3Dir) {
            $bundleDir = Get-ChildItem -Path $vst3Dir -Directory -Filter "*.vst3" | Select-Object -First 1
            if ($null -ne $bundleDir) {
              $resourcesDir = Join-Path $bundleDir.FullName "Contents\\Resources"
              New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null

              $texturesSrc = Join-Path $srcRoot "textures"
              if (Test-Path $texturesSrc) {
                $texturesDst = Join-Path $resourcesDir "textures"
                if (Test-Path $texturesDst) { Remove-Item -Recurse -Force $texturesDst }
                Copy-Item -Recurse -Force $texturesSrc $texturesDst
              }
              foreach ($noticeName in $noticeFiles) {
                $noticeSrc = Join-Path $srcRoot $noticeName
                if (Test-Path $noticeSrc) {
                  Copy-Item -Force $noticeSrc (Join-Path $resourcesDir $noticeName)
                }
              }

              $vdoSrc = Join-Path $srcRoot "advanced-vdo-client"
              if (Test-Path $vdoSrc) {
                $vdoDst = Join-Path $resourcesDir "advanced-vdo-client"
                if (Test-Path $vdoDst) { Remove-Item -Recurse -Force $vdoDst }
                Copy-Item -Recurse -Force $vdoSrc $vdoDst
              }
            }
            Compress-Archive -Force -Path (Join-Path $vst3Dir "*") -DestinationPath "out\NINJAMplus-windows-vst3.zip"
          } else {
            throw "VST3 artefacts not found at $vst3Dir"
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: out/*.zip

  linux:
    name: Linux (Standalone, VST3, LV2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libasound2-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libxfixes-dev

      - name: Detect project root
        shell: bash
        run: |
          set -euo pipefail
          CMAKE_FILE="$(
            find . -name CMakeLists.txt -type f -print0 | while IFS= read -r -d '' f; do
              if grep -Eq 'project[[:space:]]*\([[:space:]]*NINJAM_VST3\b' "$f"; then
                echo "$f"
                break
              fi
            done
          )"
          if [ -z "${CMAKE_FILE}" ]; then
            echo "Could not find CMakeLists.txt for NINJAM_VST3"
            exit 1
          fi
          SRC_DIR="$(dirname "${CMAKE_FILE}")"
          SRC_DIR="${SRC_DIR#./}"
          if [ -z "${SRC_DIR}" ]; then SRC_DIR="."; fi
          echo "SRC_DIR=${SRC_DIR}" >> "$GITHUB_ENV"
          echo "Using SRC_DIR=${SRC_DIR}"

      - name: Configure
        run: cmake -S "${SRC_DIR}" -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: >
          cmake --build build
          --target NINJAM_VST3_Standalone NINJAM_VST3_VST3 NINJAM_VST3_LV2

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out

          ARTEFACTS="build/NINJAMplus/Release"
          STANDALONE_DIR="${ARTEFACTS}/Standalone"
          VST3_DIR="${ARTEFACTS}/VST3"
          LV2_DIR="${ARTEFACTS}/LV2"
          SRC_ROOT="${SRC_DIR}"
          NOTICE_FILES=("LEGAL_NOTICES.txt" "THIRD_PARTY_NOTICES.md")

          copy_notice_files() {
            local dest_dir="$1"
            mkdir -p "${dest_dir}"
            for notice in "${NOTICE_FILES[@]}"; do
              if [ -f "${SRC_ROOT}/${notice}" ]; then
                cp -f "${SRC_ROOT}/${notice}" "${dest_dir}/"
              fi
            done
          }

          copy_helper_dir() {
            local dest_dir="$1"
            mkdir -p "${dest_dir}"
            rm -rf "${dest_dir}/advanced-vdo-client" "${dest_dir}/textures" || true
            cp -R "${SRC_ROOT}/advanced-vdo-client" "${dest_dir}/advanced-vdo-client"
            cp -R "${SRC_ROOT}/textures" "${dest_dir}/textures"
            copy_notice_files "${dest_dir}"
          }

          if [ -d "${STANDALONE_DIR}" ]; then
            copy_helper_dir "${STANDALONE_DIR}"
            tar -C "${STANDALONE_DIR}" -czf "out/NINJAMplus-linux-standalone.tar.gz" .
          else
            echo "Standalone artefacts not found at ${STANDALONE_DIR}"
            exit 1
          fi

          if [ -d "${VST3_DIR}" ]; then
            VST3_PATH="$(find "${VST3_DIR}" -maxdepth 1 -name "*.vst3" -print -quit)"
            if [ -z "${VST3_PATH}" ]; then
              echo "No .vst3 found in ${VST3_DIR}"
              exit 1
            fi
            copy_helper_dir "${VST3_PATH}"
            tar -C "${VST3_DIR}" -czf "out/NINJAMplus-linux-vst3.tar.gz" "$(basename "${VST3_PATH}")"
          else
            echo "VST3 artefacts not found at ${VST3_DIR}"
            exit 1
          fi

          if [ -d "${LV2_DIR}" ]; then
            LV2_PATH="$(find "${LV2_DIR}" -maxdepth 1 -name "*.lv2" -print -quit)"
            if [ -z "${LV2_PATH}" ]; then
              echo "No .lv2 found in ${LV2_DIR}"
              exit 1
            fi
            copy_helper_dir "${LV2_PATH}"
            tar -C "${LV2_DIR}" -czf "out/NINJAMplus-linux-lv2.tar.gz" "$(basename "${LV2_PATH}")"
          else
            echo "LV2 artefacts not found at ${LV2_DIR}"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: out/*

  mac:
    name: macOS (Standalone, AU, VST3)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect project root
        shell: bash
        run: |
          set -euo pipefail
          CMAKE_FILE="$(
            find . -name CMakeLists.txt -type f -print0 | while IFS= read -r -d '' f; do
              if grep -Eq 'project[[:space:]]*\([[:space:]]*NINJAM_VST3\b' "$f"; then
                echo "$f"
                break
              fi
            done
          )"
          if [ -z "${CMAKE_FILE}" ]; then
            echo "Could not find CMakeLists.txt for NINJAM_VST3"
            exit 1
          fi
          SRC_DIR="$(dirname "${CMAKE_FILE}")"
          SRC_DIR="${SRC_DIR#./}"
          if [ -z "${SRC_DIR}" ]; then SRC_DIR="."; fi
          echo "SRC_DIR=${SRC_DIR}" >> "$GITHUB_ENV"
          echo "Using SRC_DIR=${SRC_DIR}"

      - name: Configure
        run: cmake -S "${SRC_DIR}" -B build -G Xcode

      - name: Build
        run: >
          cmake --build build --config Release
          --target NINJAM_VST3_Standalone NINJAM_VST3_AU NINJAM_VST3_VST3
          -- CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=""

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out

          ARTEFACTS="build/NINJAMplus/Release"
          STANDALONE_DIR="${ARTEFACTS}/Standalone"
          AU_DIR="${ARTEFACTS}/AU"
          VST3_DIR="${ARTEFACTS}/VST3"
          SRC_ROOT="${SRC_DIR}"
          NOTICE_FILES=("LEGAL_NOTICES.txt" "THIRD_PARTY_NOTICES.md")

          copy_notice_files() {
            local dest_dir="$1"
            mkdir -p "${dest_dir}"
            for notice in "${NOTICE_FILES[@]}"; do
              if [ -f "${SRC_ROOT}/${notice}" ]; then
                cp -f "${SRC_ROOT}/${notice}" "${dest_dir}/"
              fi
            done
          }

          if [ -d "${STANDALONE_DIR}" ]; then
            APP_PATH="$(find "${STANDALONE_DIR}" -maxdepth 1 -name "*.app" -print -quit)"
            if [ -z "${APP_PATH}" ]; then
              echo "No .app found in ${STANDALONE_DIR}"
              exit 1
            fi

            MACOS_DIR="${APP_PATH}/Contents/MacOS"
            RESOURCES_DIR="${APP_PATH}/Contents/Resources"
            copy_notice_files "${RESOURCES_DIR}"
            rm -rf "${MACOS_DIR}/textures" "${MACOS_DIR}/advanced-vdo-client" || true
            cp -R "${SRC_ROOT}/textures" "${MACOS_DIR}/textures"
            cp -R "${SRC_ROOT}/advanced-vdo-client" "${MACOS_DIR}/advanced-vdo-client"

            ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "out/NINJAMplus-macos-standalone.zip"
          else
            echo "Standalone artefacts not found at ${STANDALONE_DIR}"
            exit 1
          fi

          if [ -d "${AU_DIR}" ]; then
            COMP_PATH="$(find "${AU_DIR}" -maxdepth 1 -name "*.component" -print -quit)"
            if [ -z "${COMP_PATH}" ]; then
              echo "No .component found in ${AU_DIR}"
              exit 1
            fi
            mkdir -p "${COMP_PATH}/Contents/Resources"
            copy_notice_files "${COMP_PATH}/Contents/Resources"
            rm -rf "${COMP_PATH}/Contents/Resources/textures" "${COMP_PATH}/Contents/Resources/advanced-vdo-client" || true
            cp -R "${SRC_ROOT}/textures" "${COMP_PATH}/Contents/Resources/textures"
            cp -R "${SRC_ROOT}/advanced-vdo-client" "${COMP_PATH}/Contents/Resources/advanced-vdo-client"
            ditto -c -k --sequesterRsrc --keepParent "${COMP_PATH}" "out/NINJAMplus-macos-au.zip"
          else
            echo "AU artefacts not found at ${AU_DIR}"
            exit 1
          fi

          if [ -d "${VST3_DIR}" ]; then
            VST3_PATH="$(find "${VST3_DIR}" -maxdepth 1 -name "*.vst3" -print -quit)"
            if [ -z "${VST3_PATH}" ]; then
              echo "No .vst3 found in ${VST3_DIR}"
              exit 1
            fi
            mkdir -p "${VST3_PATH}/Contents/Resources"
            copy_notice_files "${VST3_PATH}/Contents/Resources"
            rm -rf "${VST3_PATH}/Contents/Resources/textures" "${VST3_PATH}/Contents/Resources/advanced-vdo-client" || true
            cp -R "${SRC_ROOT}/textures" "${VST3_PATH}/Contents/Resources/textures"
            cp -R "${SRC_ROOT}/advanced-vdo-client" "${VST3_PATH}/Contents/Resources/advanced-vdo-client"
            ditto -c -k --sequesterRsrc --keepParent "${VST3_PATH}" "out/NINJAMplus-macos-vst3.zip"
          else
            echo "VST3 artefacts not found at ${VST3_DIR}"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: out/*.zip
