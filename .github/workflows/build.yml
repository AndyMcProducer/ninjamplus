name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows:
    name: Windows (Standalone, VST3)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect project root
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "extras/ninjam-vst3/CMakeLists.txt") {
            "SRC_DIR=extras/ninjam-vst3" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "SRC_DIR=." | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Configure
        run: >
          cmake -S $env:SRC_DIR -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: >
          cmake --build build --config Release
          --target NINJAM_VST3_Standalone NINJAM_VST3_VST3

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path out | Out-Null

          $srcRoot = Join-Path $PWD $env:SRC_DIR
          $nodeCmd = Get-Command node -ErrorAction SilentlyContinue
          if ($null -eq $nodeCmd -or -not (Test-Path $nodeCmd.Source)) {
            throw "Node executable not found on PATH"
          }
          $nodeExe = $nodeCmd.Source

          $artefacts = Join-Path $PWD "build\NINJAM_VST3_artefacts\Release"
          $standaloneDir = Join-Path $artefacts "Standalone"
          $vst3Dir = Join-Path $artefacts "VST3"

          if (Test-Path $standaloneDir) {
            $texturesSrc = Join-Path $srcRoot "textures"
            if (Test-Path $texturesSrc) {
              $texturesDst = Join-Path $standaloneDir "textures"
              if (Test-Path $texturesDst) { Remove-Item -Recurse -Force $texturesDst }
              Copy-Item -Recurse -Force $texturesSrc $texturesDst
            }
            $vdoSrc = Join-Path $srcRoot "advanced-vdo-client"
            if (Test-Path $vdoSrc) {
              $vdoDst = Join-Path $standaloneDir "advanced-vdo-client"
              if (Test-Path $vdoDst) { Remove-Item -Recurse -Force $vdoDst }
              Copy-Item -Recurse -Force $vdoSrc $vdoDst
              Copy-Item -Force $nodeExe (Join-Path $vdoDst "node.exe")
            }
            Compress-Archive -Force -Path (Join-Path $standaloneDir "*") -DestinationPath "out\windows-standalone.zip"
          } else {
            throw "Standalone artefacts not found at $standaloneDir"
          }

          if (Test-Path $vst3Dir) {
            $bundleDir = Get-ChildItem -Path $vst3Dir -Directory -Filter "*.vst3" | Select-Object -First 1
            if ($null -ne $bundleDir) {
              $resourcesDir = Join-Path $bundleDir.FullName "Contents\\Resources"
              New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null

              $texturesSrc = Join-Path $srcRoot "textures"
              if (Test-Path $texturesSrc) {
                $texturesDst = Join-Path $resourcesDir "textures"
                if (Test-Path $texturesDst) { Remove-Item -Recurse -Force $texturesDst }
                Copy-Item -Recurse -Force $texturesSrc $texturesDst
              }

              $vdoSrc = Join-Path $srcRoot "advanced-vdo-client"
              if (Test-Path $vdoSrc) {
                $vdoDst = Join-Path $resourcesDir "advanced-vdo-client"
                if (Test-Path $vdoDst) { Remove-Item -Recurse -Force $vdoDst }
                Copy-Item -Recurse -Force $vdoSrc $vdoDst
                Copy-Item -Force $nodeExe (Join-Path $vdoDst "node.exe")
              }
            }
            Compress-Archive -Force -Path (Join-Path $vst3Dir "*") -DestinationPath "out\windows-vst3.zip"
          } else {
            throw "VST3 artefacts not found at $vst3Dir"
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: out/*.zip

  mac:
    name: macOS (Standalone, AU, VST3)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect project root
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "extras/ninjam-vst3/CMakeLists.txt" ]; then
            echo "SRC_DIR=extras/ninjam-vst3" >> "$GITHUB_ENV"
          else
            echo "SRC_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: cmake -S "${SRC_DIR}" -B build -G Xcode

      - name: Build
        run: >
          cmake --build build --config Release
          --target NINJAM_VST3_Standalone NINJAM_VST3_AU NINJAM_VST3_VST3
          -- CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=""

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out

          ARTEFACTS="build/NINJAM_VST3_artefacts/Release"
          STANDALONE_DIR="${ARTEFACTS}/Standalone"
          AU_DIR="${ARTEFACTS}/AU"
          VST3_DIR="${ARTEFACTS}/VST3"
          SRC_ROOT="${SRC_DIR}"
          NODE_BIN="$(command -v node || true)"
          if [ -z "${NODE_BIN}" ] || [ ! -f "${NODE_BIN}" ]; then
            echo "Node executable not found on PATH"
            exit 1
          fi

          if [ -d "${STANDALONE_DIR}" ]; then
            APP_PATH="$(find "${STANDALONE_DIR}" -maxdepth 1 -name "*.app" -print -quit)"
            if [ -z "${APP_PATH}" ]; then
              echo "No .app found in ${STANDALONE_DIR}"
              exit 1
            fi

            MACOS_DIR="${APP_PATH}/Contents/MacOS"
            rm -rf "${MACOS_DIR}/textures" "${MACOS_DIR}/advanced-vdo-client" || true
            cp -R "${SRC_ROOT}/textures" "${MACOS_DIR}/textures"
            cp -R "${SRC_ROOT}/advanced-vdo-client" "${MACOS_DIR}/advanced-vdo-client"
            cp -f "${NODE_BIN}" "${MACOS_DIR}/advanced-vdo-client/node"
            chmod +x "${MACOS_DIR}/advanced-vdo-client/node"

            ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "out/macos-standalone.zip"
          else
            echo "Standalone artefacts not found at ${STANDALONE_DIR}"
            exit 1
          fi

          if [ -d "${AU_DIR}" ]; then
            COMP_PATH="$(find "${AU_DIR}" -maxdepth 1 -name "*.component" -print -quit)"
            if [ -z "${COMP_PATH}" ]; then
              echo "No .component found in ${AU_DIR}"
              exit 1
            fi
            mkdir -p "${COMP_PATH}/Contents/Resources"
            rm -rf "${COMP_PATH}/Contents/Resources/textures" "${COMP_PATH}/Contents/Resources/advanced-vdo-client" || true
            cp -R "${SRC_ROOT}/textures" "${COMP_PATH}/Contents/Resources/textures"
            cp -R "${SRC_ROOT}/advanced-vdo-client" "${COMP_PATH}/Contents/Resources/advanced-vdo-client"
            cp -f "${NODE_BIN}" "${COMP_PATH}/Contents/Resources/advanced-vdo-client/node"
            chmod +x "${COMP_PATH}/Contents/Resources/advanced-vdo-client/node"
            ditto -c -k --sequesterRsrc --keepParent "${COMP_PATH}" "out/macos-au.zip"
          else
            echo "AU artefacts not found at ${AU_DIR}"
            exit 1
          fi

          if [ -d "${VST3_DIR}" ]; then
            VST3_PATH="$(find "${VST3_DIR}" -maxdepth 1 -name "*.vst3" -print -quit)"
            if [ -z "${VST3_PATH}" ]; then
              echo "No .vst3 found in ${VST3_DIR}"
              exit 1
            fi
            mkdir -p "${VST3_PATH}/Contents/Resources"
            rm -rf "${VST3_PATH}/Contents/Resources/textures" "${VST3_PATH}/Contents/Resources/advanced-vdo-client" || true
            cp -R "${SRC_ROOT}/textures" "${VST3_PATH}/Contents/Resources/textures"
            cp -R "${SRC_ROOT}/advanced-vdo-client" "${VST3_PATH}/Contents/Resources/advanced-vdo-client"
            cp -f "${NODE_BIN}" "${VST3_PATH}/Contents/Resources/advanced-vdo-client/node"
            chmod +x "${VST3_PATH}/Contents/Resources/advanced-vdo-client/node"
            ditto -c -k --sequesterRsrc --keepParent "${VST3_PATH}" "out/macos-vst3.zip"
          else
            echo "VST3 artefacts not found at ${VST3_DIR}"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: out/*.zip
